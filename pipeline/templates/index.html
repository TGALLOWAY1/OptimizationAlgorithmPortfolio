<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimization Algorithm Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; line-height: 1.7; color: #1a1a2e; background: #fafbfc; }
        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
        header { background: #1a237e; color: white; padding: 2rem; text-align: center; }
        header h1 { font-size: 2rem; }
        header p { opacity: 0.9; margin-top: 0.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .card { background: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        .card a { text-decoration: none; color: inherit; display: block; padding: 1.5rem; }
        .card h2 { font-size: 1.2rem; color: #1a237e; margin-bottom: 0.5rem; }
        .card p { font-size: 0.9rem; color: #555; }
        .card .thumb { width: 100%; height: 160px; object-fit: cover; }
        footer { text-align: center; padding: 2rem; color: #666; font-size: 0.85rem; }
    </style>
</head>
<body>
    <header>
        <h1>Optimization Algorithm Portfolio</h1>
        <p>Comprehensive educational content on optimization techniques</p>
    </header>
    <div class="container">
        <div class="grid">
            {% for t in techniques %}
            <div class="card">
                <a href="{{ t.slug }}.html">
                    {% if t.has_infographic %}
                    <img class="thumb" src="images/{{ t.slug }}/infographic.png" alt="{{ t.name }}">
                    {% endif %}
                    <h2>{{ t.name }}</h2>
                    <p>{{ t.summary }}</p>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>
    <footer>Optimization Algorithm Portfolio</footer>
</body>
</html>
